<!-- index.html v1.0.0-1 -->
<!doctype html>
<html lang="zh-TW">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>鳴潮聲骸配置</title>
		<link rel="stylesheet" href="css/style.css" />
	</head>
	<body>
		<div class="container">
			<header>
				<h1>鳴潮聲骸配置</h1>
				<div class="lang-switch">
					<button data-lang="SC">簡中</button>
					<button data-lang="TC" class="active">繁中</button>
					<button data-lang="EN">EN</button>
				</div>
			</header>

			<section class="character-section">
				<h2>角色選擇</h2>
				<div class="character-select">
					<select id="character-select">
						<option value="">選擇角色</option>
					</select>
					<div id="character-info" class="character-info hidden">
					<div class="char-card">
						<div class="char-image-wrap">
							<img id="char-icon" src="" alt="" />
							<div class="char-badges">
								<img id="char-attr-icon" class="char-badge" src="" alt="" />
								<img id="char-weapon-icon" class="char-badge" src="" alt="" />
							</div>
						</div>
						<div class="char-footer">
							<span id="char-name"></span>
							<img id="char-rarity" src="" alt="" />
						</div>
					</div>
					<div class="char-details">
						<span id="char-attr"></span>
						<span id="char-weapon"></span>
					</div>
				</div>
				</div>
			</section>

			<section class="echoes-section">
				<h2>聲骸配置</h2>
				<div class="echoes-grid">
					<div class="echo-slot main-slot" data-slot="0">
						<span class="slot-label">主位</span>
						<select class="echo-select">
							<option value="">選擇聲骸</option>
						</select>
						<div class="echo-info hidden">
						<div class="echo-card">
							<div class="echo-image-wrap">
								<img class="echo-icon" src="" alt="" />
								<span class="echo-cost-badge"></span>
							</div>
							<div class="echo-footer">
								<span class="echo-name"></span>
								<span class="echo-sonata"></span>
							</div>
						</div>
					</div>
					</div>
					<div class="echo-slot" data-slot="1">
						<span class="slot-label">聲骸 2</span>
						<select class="echo-select">
							<option value="">選擇聲骸</option>
						</select>
						<div class="echo-info hidden">
						<div class="echo-card">
							<div class="echo-image-wrap">
								<img class="echo-icon" src="" alt="" />
								<span class="echo-cost-badge"></span>
							</div>
							<div class="echo-footer">
								<span class="echo-name"></span>
								<span class="echo-sonata"></span>
							</div>
						</div>
					</div>
					</div>
					<div class="echo-slot" data-slot="2">
						<span class="slot-label">聲骸 3</span>
						<select class="echo-select">
							<option value="">選擇聲骸</option>
						</select>
						<div class="echo-info hidden">
						<div class="echo-card">
							<div class="echo-image-wrap">
								<img class="echo-icon" src="" alt="" />
								<span class="echo-cost-badge"></span>
							</div>
							<div class="echo-footer">
								<span class="echo-name"></span>
								<span class="echo-sonata"></span>
							</div>
						</div>
					</div>
					</div>
					<div class="echo-slot" data-slot="3">
						<span class="slot-label">聲骸 4</span>
						<select class="echo-select">
							<option value="">選擇聲骸</option>
						</select>
						<div class="echo-info hidden">
						<div class="echo-card">
							<div class="echo-image-wrap">
								<img class="echo-icon" src="" alt="" />
								<span class="echo-cost-badge"></span>
							</div>
							<div class="echo-footer">
								<span class="echo-name"></span>
								<span class="echo-sonata"></span>
							</div>
						</div>
					</div>
					</div>
					<div class="echo-slot" data-slot="4">
						<span class="slot-label">聲骸 5</span>
						<select class="echo-select">
							<option value="">選擇聲骸</option>
						</select>
						<div class="echo-info hidden">
						<div class="echo-card">
							<div class="echo-image-wrap">
								<img class="echo-icon" src="" alt="" />
								<span class="echo-cost-badge"></span>
							</div>
							<div class="echo-footer">
								<span class="echo-name"></span>
								<span class="echo-sonata"></span>
							</div>
						</div>
					</div>
					</div>
				</div>
			</section>
		</div>

		<script src="js/app.js"></script>
	</body>
</html>
